- title: "Teaching Assistant for Design Technologies for Integrated Systems"
  role: "Graduate course"
  venue: "EPFL"
  location: "Lausanne, Switzerland"
  year: 2023
  period: "Fall 2023"
  description: >-
    Most outstanding features of hardware compilation and techniques for optimizing logic
    representations and networks. Duties: lecturing, preparing midterm/final exams, weekly exercises
    and homeworks, grading, and assisting students during lab sessions.

- title: "Teaching Assistant for Digital System Design"
  role: "Undergraduate course"
  venue: "EPFL"
  location: "Lausanne, Switzerland"
  year: 2023
  period: "Spring 2023"
  description: >-
    Abstractions in digital hardware systems, Boolean algebra, logic gates, combinational and
    sequential circuits, finite state machines, RTL design, and VHDL. Duties: assisting students in
    lab sessions, designing the project, and correcting exams and homeworks.

