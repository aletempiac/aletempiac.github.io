# Site settings
locale                   : "en-US"
title                    : "Alessandro Tempia Calvino"
description              : "Researcher in logic synthesis, technology mapping, and electronic design automation."
url                      : "https://aletempiac.github.io"
baseurl                  : ""
repository               : "aletempiac/aletempiac.github.io"

# Site author / profile (edit your contact + social links here)
author:
  name             : "Alessandro Tempia Calvino"
  avatar           : "photo.jpg"
  bio              : "Senior Staff R&D Engineer at Synopsys"
  location         : "Sunnyvale, California, USA"
  employer         : "Synopsys"
  email            : "alessandro.tempia@gmail.com"
  googlescholar    : "https://scholar.google.com/citations?user=OzJdDk0AAAAJ&hl=en"
  researchgate     : "https://www.researchgate.net/profile/Alessandro-Tempia-Calvino"
  orcid            : "https://orcid.org/0000-0003-1312-2907"
  github           : "aletempiac"
  linkedin         : "alessandro-tempia-calvino"
  twitter          : "AleTempia"

# SEO
google_site_verification : google51d087af9baf867a.html

# Build settings
markdown     : kramdown
highlighter  : rouge
permalink    : pretty
timezone     : Europe/Zurich

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  smart_quotes: lsquo,rsquo,ldquo,rdquo

sass:
  sass_dir: _sass
  style: compressed

# Plugins (GitHub Pages compatible)
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - package.json
  - package-lock.json
  - README.md
  - CONTRIBUTING.md
  - LICENSE
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - assets/js/main.js.map
